      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');

    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');

      setStatus('Error: missing bundle data');

      return;
    }

    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];

        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }

      }

    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];

      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);

      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);

      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {

    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);

order-radius: 3px;\n}\n.curtain-head {\n  padding: 19px 16px 0;\n}\n.curtain-title-row {\n  display: flex; align-items: baseline; justify-content: space-between;\n  padding-bottom: 8px;\n}\n.curtain-title-row .ttl {\n  font-size: 17px; font-weight: 600; letter-spacing: -0.01em;\n}\n.curtain-title-row .sub-filter {\n  font-family: \"JetBrains Mono\", monospace; font-size: 10px;\n  color: var(--muted); padding: 2px 6px; border: 1px solid var(--line);\n  border-radius: 10px; white-space: nowrap;\n}\n.curtain-search-row {\n  display: flex; align-items: center; gap: 8px;\n  margin-bottom: 10px;\n}\n.curtain-search-row .curtain-search { flex: 1; margin-bottom: 0; }\n.curtain-filter-btn {\n  flex: 0 0 36px; height: 36px; width: 36px;\n  background: var(--paper); border-radius: 10px;\n  display: flex; align-items: center; justify-content: center;\n  color: var(--ink-2);\n}\n.curtain-filter-btn svg { width: 20px; height: 20px; }\n.curtain-search {\n  display: flex; align-items: center; gap: 8px;\n  height: 36px; padding: 0 12px;\n  background: var(--paper); border-radius: 10px;\n  margin-bottom: 10px;\n  font-family: \"JetBrains Mono\", monospace; font-size: 11px;\n  color: var(--muted);\n}\n.curtain-search .search-icon {\n  width: 14px; height: 14px; border: 1.5px solid currentColor;\n  border-radius: 50%; position: relative; flex-shrink: 0;\n}\n.curtain-search .search-icon::after {\n  content: \"\"; position: absolute; right: -3px; bottom: -3px;\n  width: 6px; height: 1.5px; background: currentColor; transform: rotate(45deg);\n}\n.curtain-body {\n  flex: 1; overflow: hidden; padding: 0 16px 16px;\n}\n.cart-cta {\n  position: absolute; left: 0; right: 0; bottom: 72px;\n  background: #fff;\n  border-top: 1px solid var(--line);\n  padding: 10px 16px 12px; z-index: 3;\n}\n.cart-summary {\n  margin: 4px 0 12px;\n  padding: 14px 14px 16px;\n  background: #fff; border: 1px solid var(--line-2); border-radius: 10px;\n  display: flex; flex-direction: column; gap: 7px;\n  font-family: -apple-system, \"SF Pro Text\", sans-serif;\n}\n.cart-summary-h {\n  font-family: \"JetBrains Mono\", monospace; font-size: 10px;\n  color: var(--muted); text-transform: uppercase; letter-spacing: 0.12em;\n  margin-bottom: 4px;\n}\n.cart-summary-row {\n  display: flex; justify-content: space-between;\n  font-size: 13px; color: var(--ink-2);\n}\n.cart-summary-row span:last-child { color: var(--ink); font-weight: 500; }\n.cart-summary-discount span:last-child { color: var(--good); }\n.cart-summary-total {\n  display: flex; justify-content: space-between;\n  padding-top: 10px; margin-top: 4px;\n  border-top: 1px solid var(--line-2);\n  font-size: 15px; color: var(--ink); font-weight: 700;\n}\n.cart-cta-row {\n  display: flex; flex-direction: row; align-items: center; gap: 14px;\n}\n.cart-total {\n  display: flex; flex-direction: column; align-items: flex-start;\n  flex-shrink: 0;\n  font-family: -apple-system, \"SF Pro Text\", sans-serif;\n}\n.cart-total-lbl { font-size: 13px; color: var(--muted); line-height: 1.2; }\n.cart-total-val { font-size: 17px; font-weight: 700; color: var(--ink); letter-spacing: -0.01em; line-height: 1.1; }\n.cart-buy {\n  flex: 1; height: 50px; background: var(--ink); color: #fff;\n  border-radius: 14px; display: flex; align-items: center; justify-content: center;\n  font-size: 15px; font-weight: 600;\n  font-family: -apple-system, \"SF Pro Text\", sans-serif;\n}\n.skel-row { height: 12px; background: var(--line-2); border-radius: 3px; margin: 8px 0; }\n.skel-row.short { width: 50%; }\n.skel-row.med { width: 75%; }\n.skel-card {\n  background: #fafafa; border: 1px solid var(--line); border-radius: 10px;\n  padding: 12px; margin-bottom: 10px;\n}\n.skel-img { width: 100%; height: 70px; background: var(--line-2); border-radius: 6px; margin-bottom: 8px; }\n.cards-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }\n.cards-grid .skel-card { margin: 0; }\n.cards-grid .skel-img { height: 60px; }\n.chip-row { display: flex; gap: 6px; margin-bottom: 12px; flex-wrap: wrap; }\n.chip {\n  font-size: 10px; padding: 4px 10px; border: 1px solid var(--line);\n  border-radius: 12px; color: var(--ink-2); background: #fff;\n  font-family: \"JetBrains Mono\", monospace;\n}\n.chip.active { background: var(--ink); color: #fff; border-color: var(--ink); }\n\n/* Bottom nav */\n.bottom-nav {\n  position: absolute; left: 0; right: 0; bottom: 0;\n  height: 72px; background: #fff;\n  border-top: 1px solid var(--line-2);\n  display: flex; align-items: center; justify-content: space-around;\n  padding: 10px 16px 16px;\n  z-index: 4;\n}\n.bottom-nav .tab {\n  flex: 1; min-width: 0;\n  display: flex; flex-direction: column; align-items: center; gap: 3px;\n  font-size: 10px; color: var(--muted); font-family: \"SF Pro Text\", sans-serif;\n  position: relative;\n}\n.bottom-nav .tab.active { color: var(--ink); font-weight: 700; }\n.bottom-nav .tab .ico.svg {\n  width: 44px; height: 26px; border: 0;\n  display: flex; align-items: center; justify-content: center;\n  color: currentColor; background: transparent;\n  box-sizing: border-box;\n}\n.bottom-nav .tab .ico {\n  width: 24px; height: 24px; border: 1.5px solid currentColor; border-radius: 6px;\n  display: flex; align-items: center; justify-content: center; font-size: 10px;\n}\n.layer-base.compact { padding-top: 0; }\n.layer-base.compact .statusbar { color: #fff; }\n.garage-topbar.big {\n  padding: 50px 18px 16px;\n  background: #1a1a1a;\n}\n.garage-topbar.big .mini-car { font-family: -apple-system, \"SF Pro Text\", sans-serif; font-size: 17px; color: #fff; }\n.garage-topbar.big .mini-car .active-car-name b { font-weight: 700; }\n.garage-topbar.big .mini-car .dim { color: rgba(255,255,255,0.55); font-weight: 400; }\n.compact-spacer { height: 0; }\n\n.top-ico.gift.filled {\n  background: #f5b800;\n  border-color: #f5b800;\n  width: 30px; height: 30px;\n}\n.top-ico.gift.filled .gift-box { background: #fff; }\n.top-ico.gift.filled .gift-ribbon { background: #fff; }\n.top-ico.gift.filled::after { background: #fff; }\n.top-ico.avatar.bigger { width: 30px; height: 30px; background: transparent; border-color: rgba(255,255,255,0.3); }\n.top-ico .dot {\n  position: absolute; top: -2px; right: -2px;\n  width: 8px; height: 8px; border-radius: 50%;\n  background: #ff3b30; border: 1.5px solid #1a1a1a;\n}\n\n/* Home feed — schematic blocks (hero with slider + section + mini cards row) */\n.home-hero {\n  background: var(--line-2);\n  border-radius: 14px; padding: 14px 16px 12px;\n  margin-bottom: 16px; position: relative;\n}\n.home-hero-dots {\n  display: flex; gap: 4px; margin-top: 12px;\n  justify-content: center;\n}\n.home-hero-dots .dot {\n  width: 5px; height: 5px; border-radius: 3px;\n  background: var(--line);\n}\n.home-hero-dots .dot.active { background: var(--ink); width: 16px; }\n.home-section-h {\n  display: flex; justify-content: space-between; align-items: center;\n  margin: 4px 0 10px;\n}\n.home-row {\n  display: flex; gap: 8px; margin-bottom: 16px;\n  overflow-x: clip;\n}\n.home-mini-card {\n  flex: 0 0 30%; min-width: 0;\n  background: var(--card); border: 1px solid var(--line-2);\n  border-radius: 8px; padding: 6px;\n}\n.home-mini-thumb {\n  width: 100%; height: 48px;\n  background: var(--line-2); border-radius: 4px;\n}\n\n/* Big soft cards (Ivan's reference) */\n.curtain-body .big-card {\n  background: #efefef; border-radius: 18px;\n  padding: 50px 16px; margin-bottom: 12px;\n  text-align: center; font-size: 15px; color: var(--muted);\n  font-weight: 500;\n}\n\n/* Centered curtain title */\n.curtain-title-row.centered { justify-content: center; padding-top: 4px; }\n.curtain-title-row.centered .ttl { font-size: 17px; font-weight: 700; }\n\n/* Bottom nav: SVG icons + numeric cart badge */\n.bottom-nav .tab .ico.svg svg { width: 22px; height: 22px; }\n.cart-badge-num {\n  position: absolute; top: -6px; right: -8px;\n  min-width: 16px; height: 16px; padding: 0 4px;\n  background: #ff3b30; color: #fff;\n  border-radius: 8px; font-size: 10px; font-weight: 600;\n  display: flex; align-items: center; justify-content: center;\n  font-family: -apple-system, \"SF Pro Text\", sans-serif;\n}\n\n/* Fullscreen / modal layer */\n.layer-full {\n  top: 0; bottom: 0; background: #fff;\n  display: flex; flex-direction: column;\n}\n.full-header {\n  padding: 50px 18px 12px; display: flex; align-items: center; justify-content: space-between;\n  border-bottom: 1px solid var(--line);\n}\n.full-header .close {\n  width: 22px; height: 28px;\n  display: flex; align-items: center; justify-content: flex-start;\n  font-size: 18px; font-weight: 400; color: var(--ink);\n}\n.full-header .step {\n  font-family: \"JetBrains Mono\", monospace; font-size: 11px; color: var(--muted);\n}\n.full-header .title { font-size: 15px; font-weight: 600; }\n.full-body { flex: 1; padding: 20px 18px; }\n.full-cta {\n  margin: 0 18px 32px; height: 50px; background: var(--ink); color: #fff;\n  border-radius: 14px; display: flex; align-items: center; justify-content: center;\n  font-weight: 600; font-size: 15px;\n}\n.progress-track {\n  height: 3px; background: var(--line-2); border-radius: 2px; margin: 8px 18px 0;\n  overflow: hidden;\n}\n.progress-track .fill { height: 100%; background: var(--ink); }\n\n/* Annotations / leaders */\n.annot-wrap { position: relative; }\n.annot {\n  font-family: \"JetBrains Mono\", monospace; font-size: 11px;\n  color: var(--ink-2); background: var(--accent-soft);\n  border: 1px dashed var(--accent); padding: 4px 8px; border-radius: 4px;\n  display: inline-block; max-width: 220px; line-height: 1.35;\n}\n.annot b { color: var(--accent); font-weight: 600; }\n\n/* Diagrams */\n.diagram {\n  background: var(--card); border: 1px solid var(--line); border-radius: 8px;\n  padding: 28px; margin: 16px 0 24px;\n}\n.diagram .axis-label {\n  font-family: \"JetBrains Mono\", monospace; font-size: 10px;\n  color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em;\n}\n\n/* Lists */\nul.rules { padding-left: 0; list-style: none; max-width: 70ch; }\nul.rules li {\n  position: relative; padding: 12px 0 12px 32px;\n  border-bottom: 1px solid var(--line-2); color: var(--ink-2);\n}\nul.rules li:last-child { border-bottom: 0; }\nul.rules li::before {\n  content: counter(rule, decimal-leading-zero);\n  counter-increment: rule;\n  position: absolute; left: 0; top: 13px;\n  font-family: \"JetBrains Mono\", monospace; font-size: 11px; color: var(--muted);\n}\nul.rules { counter-reset: rule; }\nul.rules b { color: var(--ink); font-weight: 600; }\n\n/* Do / Don't */\n.dodont { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin: 16px 0; }\n.dodont .col {\n  background: var(--card); border: 1px solid var(--line); border-radius: 8px; padding: 16px;\n}\n.dodont .col .tag {\n  font-family: \"JetBrains Mono\", monospace; font-size: 10px;\n  text-transform: uppercase; letter-spacing: 0.15em; margin-bottom: 8px;\n  display: inline-block;\n}\n.dodont .col.do .tag { color: var(--good); }\n.dodont .col.dont .tag { color: var(--bad); }\n.dodont .col p { margin: 0; font-size: 13px; max-width: none; }\n\n/* Spec table */\ntable.spec {\n  width: 100%; max-width: 70ch; border-collapse: collapse;\n  font-size: 13px; margin: 16px 0;\n}\ntable.spec th, table.spec td {\n  text-align: left; padding: 10px 12px; border-bottom: 1px solid var(--line-2);\n  vertical-align: top;\n}\ntable.spec th {\n  font-family: \"JetBrains Mono\", monospace; font-size: 11px;\n  color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; font-weight: 500;\n}\ntable.spec td.k { font-family: \"JetBrains Mono\", monospace; font-size: 12px; color: var(--ink); width: 26%; }\n\n/* Cover */\n.cover {\n  min-height: 75vh; padding: 80px 0 60px;\n  display: flex; flex-direction: column; justify-content: space-between;\n  border-bottom: 1px solid var(--rule); margin-bottom: 60px;\n}\n.cover-foot {\n  display: flex; justify-content: space-between; align-items: flex-end;\n  font-family: \"JetBrains Mono\", monospace; font-size: 11px;\n  color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em;\n}\n.cover-meta { display: flex; gap: 40px; }\n.cover-meta div span { display: block; color: var(--ink); }\n\n/* Sketchy underline accent */\n.hl { background: linear-gradient(180deg, transparent 60%, var(--accent-soft) 60%); }\n\n/* Annotation overlay (absolute callouts on phones) */\n.annot-callout {\n  position: absolute; pointer-events: none;\n  font-family: \"JetBrains Mono\", monospace; font-size: 10px;\n  color: var(--ink); line-height: 1.35;\n}\n.annot-callout .pin {\n  width: 8px; height: 8px; border: 1.5px solid var(--accent);\n  background: #fff; border-radius: 50%; display: inline-block;\n}\n.annot-callout .leader {\n  position: absolute; height: 1px; background: var(--accent);\n  top: 4px;\n}\n.annot-callout .leader.dashed {\n  background: transparent;\n  border-top: 1px dashed var(--accent);\n}\n.annot-callout .lbl {\n  background: #fff; border: 1px solid var(--accent);\n  padding: 3px 7px; border-radius: 3px; white-space: nowrap;\n  color: var(--accent);\n}\n\n/* Hero diagram (cover) */\n.hero-stack {\n  display: flex; align-items: flex-end; gap: 60px; margin-top: 40px;\n}\n\n/* Annotated phone container */\n.annot-phone {\n  position: relative; padding: 0 420px 0 0; min-height: 660px;\n}\n.annot-phone .phone { margin: 0; }\n.annot-phone .anno {\n  position: absolute; max-width: 380px;\n  padding-left: 26px;\n  font-family: \"JetBrains Mono\", monospace; font-size: 11px;\n  color: var(--ink-2); line-height: 1.4;\n}\n.annot-phone .anno .num {\n  position: absolute; left: 0; top: 0;\n  width: 18px; height: 18px; border-radius: 50%;\n  background: var(--accent); color: #fff; font-size: 10px; font-weight: 700;\n  text-align: center; line-height: 18px;\n}\n.annot-phone.tall { min-height: 0; }\n\n/* Tall phone \u2014 content-driven height, no home indicator */\n.phone.tall { width: 280px; height: auto; }\n.phone.tall .layer-base {\n  position: relative; top: auto; bottom: auto;\n  min-height: 0; padding-bottom: 24px;\n}\n.phone.tall .layer-base .statusbar { position: relative; top: auto; }\n.phone.tall { padding-top: 0; }\n.phone.tall .layer-base { padding-top: 0; }\n\n/* Single car card \u2014 no horizontal scroll */\n.car-cards.single { overflow: visible; padding-bottom: 12px; }\n.car-cards.single .car-card { flex: 1 1 auto; }\n\n/* H-row inside base-section (heading + count badge) */\n.base-section .h-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }\n.base-section .h-row .h { margin: 0; }\n/* Promo banner */\n.promo-banner {\n  position: relative; margin: 12px 16px 0; padding: 12px 14px;\n  background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.1);\n  border-radius: 14px;\n  display: flex; align-items: center; gap: 12px; overflow: hidden;\n}\n.promo-content { flex: 1; min-width: 0; }\n.promo-eyebrow {\n  font-family: \"JetBrains Mono\", monospace; font-size: 9px; opacity: 0.6;\n  text-transform: uppercase; letter-spacing: 0.08em;\n}\n.promo-title { font-size: 14px; font-weight: 700; margin-top: 2px; color: #fff; }\n.promo-cta {\n  color: rgba(245,243,238,0.95); font-size: 12px; font-weight: 600;\n  margin-top: 4px;\n  text-decoration: underline; text-decoration-style: dotted; text-underline-offset: 3px;\n}\n.promo-art {\n  width: 50px; height: 40px;\n  background: rgba(255,255,255,0.06);\n  border: 1px solid rgba(255,255,255,0.12);\n  border-radius: 6px; flex: 0 0 50px;\n}\n.promo-close {\n  position: absolute; top: 8px; right: 10px;\n  width: 16px; height: 16px;\n  background: rgba(255,255,255,0.1); border-radius: 50%;\n  display: flex; align-items: center; justify-content: center;\n  font-size: 11px; line-height: 1; opacity: 0.7;\n}\n\n/* Wishlist */\n.wishlist-row {\n  display: flex; gap: 10px;\n  padding: 4px 2px;\n}\n.wish-card {\n  flex: 0 0 76px; height: 76px; border-radius: 12px;\n  background: rgba(255,255,255,0.05);\n  border: 1px solid rgba(255,255,255,0.08);\n  position: relative;\n  display: flex; align-items: center; justify-content: center;\n}\n.wish-img {\n  width: 36px; height: 50px;\n  background: linear-gradient(135deg, rgba(245,243,238,0.4), rgba(245,243,238,0.15));\n  border-radius: 4px; display: block;\n}\n.wish-img.a { background: linear-gradient(135deg, rgba(245,243,238,0.5), rgba(245,243,238,0.18)); border-radius: 6px 6px 4px 4px; }\n.wish-img.y { background: linear-gradient(135deg, rgba(245,243,238,0.45), rgba(245,243,238,0.18)); border-radius: 4px; }\n.wish-img.b { background: linear-gradient(135deg, rgba(245,243,238,0.4), rgba(245,243,238,0.15)); border-radius: 4px; }\n.wish-img.f { background: rgba(245,243,238,0.18); border-radius: 4px; width: 50px; height: 30px; }\n.wish-img.w { width: 50px; height: 50px; border-radius: 50%; background: radial-gradient(circle at 35% 35%, rgba(245,243,238,0.4), rgba(245,243,238,0.12) 70%); }\n.discount-tag {\n  position: absolute; top: 4px; left: 4px;\n  background: rgba(245,243,238,0.92); color: #1f1d1a;\n  font-family: \"JetBrains Mono\", monospace; font-size: 9px; font-weight: 700;\n  padding: 2px 5px; border-radius: 4px; line-height: 1;\n}\n\n/* Rewards grid */\n.rewards-grid {\n  display: grid; grid-template-columns: 1fr 1fr;\n  gap: 8px; margin-top: 6px;\n}\n.reward-card {\n  background: rgba(255,255,255,0.05);\n  border: 1px solid rgba(255,255,255,0.08);\n  border-radius: 12px; padding: 10px 12px;\n  display: flex; align-items: center; gap: 10px;\n}\n.reward-svg {\n  width: 24px; height: 24px; flex: 0 0 24px;\n  color: rgba(245,243,238,0.85);\n}\n.reward-meta { line-height: 1.2; }\n.reward-val { font-size: 13px; font-weight: 700; color: #fff; }\n.reward-lbl {\n  font-family: \"JetBrains Mono\", monospace; font-size: 9px;\n  opacity: 0.6; text-transform: lowercase;\n}\n\n/* Quick links */\n.quick-grid {\n  display: grid; grid-template-columns: 1fr 1fr;\n  gap: 8px;\n}\n.quick-card {\n  background: rgba(255,255,255,0.05);\n  border: 1px solid rgba(255,255,255,0.08);\n  border-radius: 12px; padding: 14px 12px;\n  display: flex; flex-direction: column; align-items: center; gap: 8px;\n  text-align: center;\n}\n.quick-svg {\n  width: 22px; height: 22px;\n  color: rgba(245,243,238,0.85);\n}\n.quick-lbl {\n  font-size: 11px; color: rgba(245,243,238,0.95); font-weight: 600;\n}\n\n/* Sketch arrows (SVG inline) */\n.arrow-svg { display: block; }\n\n/* Tweaks panel scoped overrides handled inside component */\n\n/* Print */\n@media print {\n  .toc { display: none; }\n  .layout { grid-template-columns: 1fr; }\n  main { padding: 24px; }\n}\n</style>\n<script src=\"3b6e3bfe-b001-4182-95bc-d36e3f6a2a4f\" integrity=\"sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L\" crossorigin=\"anonymous\"></script>\n<script src=\"2dd7b41c-d38a-4466-8dc1-bbc874dda016\" integrity=\"sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm\" crossorigin=\"anonymous\"></script>\n<script src=\"def935e7-e4f2-45d9-8cd2-60a9cee4f19b\" integrity=\"sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y\" crossorigin=\"anonymous\"></script>\n</head>\n<body>\n\n<div id=\"root\"></div>\n\n<script type=\"text/babel\" src=\"701bc8db-f13c-43dc-8f57-df5823a91bb3\"></script>\n<script type=\"text/babel\" src=\"02c02b73-885e-4e72-8d3b-f768c1accb06\"></script>\n<script type=\"text/babel\" src=\"1785f3d1-7dd4-4dcc-9c7a-418263339660\"></script>\n<script type=\"text/babel\" src=\"073d1edd-7374-4e00-855b-034f181e37af\"></script>\n<script type=\"text/babel\" src=\"86cbc9fd-6cef-4ce8-99f4-bfc519db08d1\"></script>\n<script type=\"text/babel\" src=\"b67576c8-9486-4ecb-b0a7-bf10638abf24\"></script>\n<script type=\"text/babel\" src=\"cf52ed74-12b4-4ff9-9905-6a1da5b0de4e\"></script>\n<script type=\"text/babel\" src=\"29ae0c2f-cf33-4be4-a237-a8e46996ba9f\"></script>\n<script type=\"text/babel\" src=\"470b337f-2b81-4a39-ab6d-f99db859768a\"></script>\n<script type=\"text/babel\" src=\"3c610e06-7907-4d15-a391-2ae755af1b57\"></script>\n<script type=\"t
